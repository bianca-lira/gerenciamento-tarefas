spring.application.name=gerenciamento
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.datasource.url=jdbc:sqlserver://localhost;databaseName=gerenciamento;encrypt=true;trustServerCertificate=true
spring.datasource.username=user
spring.datasource.password=123
spring.jpa.show-sql=true
# "update" preserves data across restarts; run schema.sql manually to seed a fresh database
spring.jpa.hibernate.ddl-auto=update
spring.jpa.defer-datasource-initialization=false
spring.sql.init.mode=never
logging.level.org.springframework.boot.context.config=DEBUG
logging.level.org.hibernate.SQL=DEBUG
